<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Collection Viewer - Test Suite</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 1400px; margin: 0 auto; background: #1a1a1a; color: #fff; }
    h1 { color: #e63946; text-align: center; }
    .summary { font-size: 1.5em; font-weight: bold; margin: 30px 0; padding: 25px; border-radius: 8px; text-align: center; }
    .summary.pass { background: #1e3a1e; color: #4caf50; }
    .summary.fail { background: #3a1e1e; color: #f44336; }
    .suite { margin: 30px 0; padding: 20px; background: #2a2a2a; border-radius: 8px; border-left: 4px solid #e63946; }
    .suite h2 { margin-top: 0; color: #e63946; }
    .test { margin: 10px 0; padding: 10px; border: 1px solid #444; border-radius: 5px; background: #333; }
    .test.pass { background: #1e3a1e; border-color: #4caf50; }
    .test.fail { background: #3a1e1e; border-color: #f44336; }
    .error { margin-top: 5px; padding: 8px; background: #1a1a1a; border-radius: 3px; font-size: 0.85rem; font-family: monospace; }
    .stats { font-size: 0.9em; color: #999; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🧪 MTG Collection Viewer - Test Suite</h1>
  <div id="summary"></div>
  <div id="results"></div>
  <script src="test.js"></script>
</body>
</html>
