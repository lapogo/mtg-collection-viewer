name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JS files
        run: |
          for file in js/*.js test/test.js; do
            [ -f "$file" ] && node -c "$file"
          done

      - name: Validate inline scripts in HTML
        run: |
          for file in *.html; do
            [ -f "$file" ] && node -e "
              const fs = require('fs');
              const html = fs.readFileSync('$file', 'utf8');
              const re = /<script>([\s\S]*?)<\/script>/g;
              let m, i = 0;
              while ((m = re.exec(html)) !== null) {
                i++;
                try { new Function(m[1]); }
                catch(e) { console.error('❌ $file <script> #' + i + ': ' + e.message); process.exit(1); }
              }
            "
          done
