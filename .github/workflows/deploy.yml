name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JS files
        run: |
          for file in js/*.js test/test.js; do
            [ -f "$file" ] && node -c "$file"
          done

      - name: Validate inline scripts in HTML
        run: |
          for file in *.html; do
            [ -f "$file" ] && node -e "
              const fs = require('fs');
              const html = fs.readFileSync('$file', 'utf8');
              const re = /<script>([\s\S]*?)<\/script>/g;
              let m, i = 0;
              while ((m = re.exec(html)) !== null) {
                i++;
                try { new Function(m[1]); }
                catch(e) { console.error('❌ $file <script> #' + i + ': ' + e.message); process.exit(1); }
              }
            "
          done

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
